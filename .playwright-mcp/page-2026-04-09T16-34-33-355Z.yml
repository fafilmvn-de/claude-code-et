          - paragraph [ref=e69]: Understanding ownership, shares, and why companies go public
      - generic [ref=e70]:
        - generic [ref=e71]: 🍕
        - heading "Imagine You Own a Pizza Shop..." [level=3] [ref=e72]
        - paragraph [ref=e73]:
          - text: You start a pizza shop. It's doing great! But you need
          - strong [ref=e74]: $10,000
          - text: to open a second location. You don't have that much cash.
        - paragraph [ref=e75]:
          - text: So you split your business into
          - strong [ref=e76]: 100 equal pieces
          - text: called
          - strong [ref=e77]: "\"shares\""
          - text: . Each share is worth
          - strong [ref=e78]: $100
          - text: . You sell 50 shares to friends and family, raising $5,000. Now they each own a tiny piece of your pizza shop! 🎉
        - paragraph [ref=e79]:
          - text: That's exactly what a
          - strong [ref=e80]: stock
          - text: is — a small piece of ownership in a company.
      - generic [ref=e81]:
        - heading "📌 Key Concepts" [level=3] [ref=e82]
        - paragraph [ref=e83]:
          - strong [ref=e84]: "Stock (or Share):"
          - text: A tiny piece of ownership in a company. When you buy a stock, you become a part-owner!
        - paragraph [ref=e85]:
          - strong [ref=e86]: "Stockholder (or Shareholder):"
          - text: Someone who owns stock in a company. That could be you!
        - paragraph [ref=e87]:
          - strong [ref=e88]: "Going Public:"
          - text: When a company sells its shares to the public for the first time. This is called an IPO (Initial Public Offering).
      - generic [ref=e89]:
        - heading "🤔 Why Do Companies Sell Stocks?" [level=3] [ref=e90]
        - paragraph [ref=e91]: Companies need money to grow — to build new factories, hire people, create new products, or expand to new countries. Instead of borrowing from a bank, they can sell pieces of themselves (stocks) to raise money.
        - paragraph [ref=e92]:
          - strong [ref=e93]: "The trade-off:"
          - text: The company gets money to grow, but now has to share its future success with all the stockholders.
      - generic [ref=e94]:
        - heading "🏷️ Company vs. Stock Price" [level=3] [ref=e95]
        - paragraph [ref=e96]:
          - text: "Here's something important:"
          - strong [ref=e97]: the stock price is not the same as the company's value.
        - paragraph [ref=e98]: "Think about it: If a company has 1,000 shares at $10 each, the total value is $10,000. But if it has 100 shares at $100 each, the total value is also $10,000!"
        - paragraph [ref=e99]:
          - text: The
          - strong [ref=e100]: price per share
          - text: depends on how many pieces the company is split into. What matters more is the
          - strong [ref=e101]: total value
          - text: of all shares combined (called "market capitalization").
