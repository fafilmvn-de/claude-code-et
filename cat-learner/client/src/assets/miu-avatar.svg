  <path d="M50 26 L46 14 L40 23 Z" fill="#c4b5fd" opacity="0.45"/>

  <!-- Face ellipse -->
  <ellipse cx="32" cy="37" rx="21" ry="20" fill="#7c6ff7"/>

  <!-- Forehead highlight -->
  <ellipse cx="32" cy="30" rx="16" ry="11" fill="#a78bfa" opacity="0.35"/>

  <!-- Left eye -->
