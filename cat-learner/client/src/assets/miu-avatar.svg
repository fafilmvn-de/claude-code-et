<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded rect -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="#0d0b1e"/>

  <!-- Left ear -->
  <path d="M10 28 L16 8 L26 24 Z" fill="#8b7cf8"/>
  <!-- Right ear -->
  <path d="M54 28 L48 8 L38 24 Z" fill="#8b7cf8"/>

  <!-- Inner ear left -->
  <path d="M14 26 L18 14 L24 23 Z" fill="#c4b5fd" opacity="0.45"/>
